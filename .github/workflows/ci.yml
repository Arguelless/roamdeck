name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (tests)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: roamdeck
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests
        working-directory: backend
        env:
          # El bean DeepSeek no se crea bajo el perfil por defecto (dev),
          # pero @EnableConfigurationProperties fuerza el binding de la
          # propiedad api-key, asi que necesita un valor para resolverse.
          DEEPSEEK_API_KEY: dummy-key-for-ci
        run: |
          chmod +x mvnw
          ./mvnw -B test

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
